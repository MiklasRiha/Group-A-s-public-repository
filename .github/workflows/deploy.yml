name: Deploy - Build JAR

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn --batch-mode package -DskipTests
        working-directory: Group3_TicTacToe

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe
          path: Group3_TicTacToe/target/*.jar
